steps:
# Step 0: Echo Project ID
- name: 'gcr.io/cloud-builders/gcloud'
  entrypoint: bash
  args:
  - -c
  - 'echo "Project ID is: $PROJECT_ID"'

# Step 1: Create the .env.local file from secret stored in Secret Manager
- name: 'bash'
  args:
  - -c
  - |
    echo "$$FELIX_STUDENT_ENV_FILE" > .env.local
  secretEnv:
  - 'FELIX_STUDENT_ENV_FILE'

# Step 2: Build the container image
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/felix-student:$COMMIT_SHA', '-f', 'Dockerfile', '.']

# Step 3: Push the container image to Container Registry
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/felix-student:$COMMIT_SHA']

# Step 4: Deploy to Cloud Run
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
  - 'run'
  - 'deploy'
  - 'felixstudent'
  - '--image'
  - 'gcr.io/$PROJECT_ID/felix-student:$COMMIT_SHA'
  - '--region'
  - 'europe-north1'
  - '--min-instances'
  - '0'
  - '--platform'
  - 'managed'

# Specify the image to be pushed
images:
- 'gcr.io/$PROJECT_ID/felix-student:$COMMIT_SHA'

# Make secrets available to the build steps
availableSecrets:
  secretManager:
  - versionName: projects/$PROJECT_ID/secrets/FELIX_STUDENT_ENV_FILE/versions/latest
    env: 'FELIX_STUDENT_ENV_FILE'

#logsBucket: 'LOGS_BUCKET_LOCATION'
#serviceAccount: 'projects/$PROJECT_ID/serviceAccounts/SERVICE_ACCOUNT'
options:
  logging: CLOUD_LOGGING_ONLY
